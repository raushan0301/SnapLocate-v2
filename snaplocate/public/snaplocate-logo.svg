<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- ── Icon container ── -->
  <rect width="44" height="44" rx="12" fill="url(#bg)"/>

  <!-- ── Location pin (clean geometric) ──
       Circle head: cx=22 cy=16 r=7.5
       Pin tail: smooth teardrop pointing to (22, 32)
  -->
  <path
    d="M22 8.5
       C26.69 8.5 30.5 12.31 30.5 17
       C30.5 20.18 28.72 22.94 26.1 24.38
       L22 32
       L17.9 24.38
       C15.28 22.94 13.5 20.18 13.5 17
       C13.5 12.31 17.31 8.5 22 8.5Z"
    fill="white"
  />
  <!-- Inner hollow — creates ring effect on pin head -->
  <circle cx="22" cy="17" r="3.6" fill="url(#bg)"/>

  <!-- ── Wordmark ── -->
  <text x="55" y="29"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="700"
    letter-spacing="-0.8"
    fill="#0f172a">snap</text>

  <text x="102" y="29"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="400"
    letter-spacing="-0.4"
    fill="#4f46e5">locate</text>
</svg>
